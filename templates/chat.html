<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #2d2d4e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .chat {
    width: 600px;
    height: 520px;
    background: #1a1a2e;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* header */
  .top {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .top-av {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f0a500, #f5c842);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .top h1 { font-size: 15px; font-weight: 600; color: #fff; }
  .top p  { font-size: 12px; color: #7878aa; margin-top: 2px; }

  /* messages */
  .msgs {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .msgs::-webkit-scrollbar { width: 3px; }
  .msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 99px; }

  .row { display: flex; align-items: flex-end; gap: 8px; }
  .row.user { flex-direction: row-reverse; }

  .av {
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .row.bot  .av { background: linear-gradient(135deg, #f0a500, #f5c842); }
  .row.user .av { background: #3dbf8a; font-size: 12px; font-weight: 600; color: #fff; }

  .msg-col { display: flex; flex-direction: column; gap: 3px; max-width: 400px; }
  .row.user .msg-col { align-items: flex-end; }

  .bub {
    padding: 10px 15px;
    border-radius: 20px;
    font-size: 13.5px;
    line-height: 1.6;
  }
  .row.bot  .bub { background: #4a9eff; color: #fff; border-bottom-left-radius: 4px; }
  .row.user .bub { background: #3dbf8a; color: #fff; border-bottom-right-radius: 4px; }

  .ts { font-size: 11px; color: #555577; padding: 0 2px; }

  /* typing */
  .dots {
    display: flex; gap: 4px; padding: 10px 14px;
    background: #4a9eff; border-radius: 20px; border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.7);
    animation: b 1s infinite ease-in-out;
  }
  .dots span:nth-child(2) { animation-delay: .15s; }
  .dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes b { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-5px);opacity:1} }

  @keyframes up { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .row { animation: up .2s ease forwards; }

  /* input */
  .bottom {
    padding: 12px 16px 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #msg-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    color: #fff;
  }
  #msg-input::placeholder { color: #55557a; }
  .send-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: #4a9eff;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .15s, transform .12s;
  }
  .send-btn:hover  { background: #2d85f0; }
  .send-btn:active { transform: scale(.93); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<div class="chat">

  <div class="top">
    <div class="top-av">👩‍⚕️</div>
    <div>
      <h1>Medical Chatbot</h1>
      <p>Ask me anything...</p>
    </div>
  </div>

  <div class="msgs" id="msgs">
    <div class="row bot">
      <div class="av">👩‍⚕️</div>
      <div class="msg-col">
        <div class="bub">Hello! How can I assist you today?</div>
        <span class="ts" id="initts"></span>
      </div>
    </div>
  </div>

  <div class="bottom">
    <input id="msg-input" type="text" placeholder="Type your message..." autocomplete="off">
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</div>

<script>
  document.getElementById('initts').textContent = now();

  // send on Enter key
  document.getElementById('msg-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addRow(role, html) {
    const msgs = document.getElementById('msgs');
    const d = document.createElement('div');
    d.className = 'row ' + role;
    const isBot = role === 'bot';
    d.innerHTML = `
      <div class="av">${isBot ? '👩‍⚕️' : 'Hi'}</div>
      <div class="msg-col">
        <div class="bub">${html}</div>
        <span class="ts">${now()}</span>
      </div>`;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('msgs');
    const d = document.createElement('div');
    d.className = 'row bot';
    d.id = 'typing-indicator';
    d.innerHTML = `
      <div class="av">👩‍⚕️</div>
      <div class="dots"><span></span><span></span><span></span></div>`;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const btn   = document.getElementById('send-btn');
    const msg   = input.value.trim();
    if (!msg) return;

    // show user message
    addRow('user', msg.replace(/</g, '&lt;'));
    input.value = '';
    btn.disabled = true;

    // show typing animation
    showTyping();

    // POST to Flask /get route — matches request.form['msg']
    const formData = new FormData();
    formData.append('msg', msg);

    fetch('/get', {
      method: 'POST',
      body: formData
    })
    .then(res => {
      if (!res.ok) throw new Error('Network error');
      return res.text();
    })
    .then(answer => {
      removeTyping();
      // preserve line breaks from the response
      const formatted = answer.replace(/</g, '&lt;').replace(/\n/g, '<br>');
      addRow('bot', formatted);
    })
    .catch(() => {
      removeTyping();
      addRow('bot', 'Sorry, something went wrong. Please try again. 🌿');
    })
    .finally(() => {
      btn.disabled = false;
      input.focus();
    });
  }
</script>

</body>
</html>
